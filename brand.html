<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HORSEMEDIC — Logo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Hanken+Grotesk:wght@500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0c0b0d; --ink2:#17151a; --orange:#f26a21; --paper:#fbf8f2;
    --line:rgba(255,255,255,.09);
    --display:"Fraunces",Georgia,serif; --body:"Hanken Grotesk",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--ink);color:#f3eee6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1120px;margin:0 auto;padding:0 28px}
  .label{font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:#8d8678}

  header{padding:96px 0 64px;text-align:center;border-bottom:1px solid var(--line);
    background:radial-gradient(1100px 360px at 50% -10%, rgba(242,106,33,.13), transparent 70%)}
  header img{width:min(540px,84vw);height:auto}

  section{padding:46px 0}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}

  .card{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--ink2)}
  .card .label{padding:16px 20px 0}
  .pane{display:grid;place-items:center;padding:46px 28px;min-height:160px;position:relative}
  .pane.dark{background:var(--ink)}
  .pane.light{background:var(--paper)}
  .pane.check{background:repeating-conic-gradient(#1c1a20 0% 25%, #161419 0% 50%) 0/26px 26px}
  .pane img.lock{width:100%;max-width:320px;height:auto}
  .pane img.ic{width:120px;height:120px;object-fit:contain}

  .stack{display:grid;gap:22px}
  @media(max-width:820px){.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>

<header>
  <img src="assets/brand/lockup-c.png" alt="HORSEMEDIC" />
</header>

<!-- lockups on dark -->
<section>
  <div class="wrap stack">
    <div class="card"><div class="pane dark"><img class="lock" src="assets/brand/lockup-a.png" alt="" /></div></div>
    <div class="card"><div class="pane light"><img class="lock" src="assets/brand/lockup-a-ink.png" alt="" /></div></div>
  </div>
</section>

<!-- icon trio -->
<section>
  <div class="wrap grid3">
    <div class="card"><div class="pane check"><img class="ic" src="assets/brand/icon-a.png" alt="" /></div></div>
    <div class="card"><div class="pane check"><img class="ic" src="assets/brand/icon-b.png" alt="" /></div></div>
    <div class="card"><div class="pane check"><img class="ic" src="assets/brand/icon-c.png" alt="" /></div></div>
  </div>
</section>

<!-- palette -->
<section>
  <div class="wrap grid3">
    <div class="card"><div class="pane" style="background:#f26a21;min-height:120px"></div></div>
    <div class="card"><div class="pane" style="background:#0c0b0d;min-height:120px"></div></div>
    <div class="card"><div class="pane" style="background:#f6f1e8;min-height:120px"></div></div>
  </div>
</section>

</body>
</html>
